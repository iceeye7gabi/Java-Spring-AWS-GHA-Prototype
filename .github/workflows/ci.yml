name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and test with Maven
        run: mvn -B verify

      - name: Build Docker image
        run: docker build -t task-management:${{ github.sha }} .

      - name: Deploy to AWS Elastic Beanstalk (placeholder)
        if: false
        run: |
          echo "Configure EB CLI, OIDC to AWS, or a third-party action to deploy the built JAR or container."
          echo "Example: eb deploy after packaging application.jar into a version label."
