# Deploys a new Elastic Beanstalk application version (build JAR → upload to S3 → create version → update env).
#
# Authentication (pick one):
#   A) OIDC + secret: AWS_ROLE_TO_ASSUME = IAM role ARN
#   B) OIDC + variable (no secret): AWS_DEPLOY_ROLE_ARN = same ARN as a repository *variable* (visible; OIDC still required)
#   C) Static keys: AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY + AWS_AUTH_MODE=static as repository *variable* OR *secret* (bypasses OIDC)
#
# Trigger: manual only (Actions → Deploy to AWS → Run workflow). See .github/DEPLOY_AWS_SETUP.md

name: Deploy to AWS (Elastic Beanstalk)

on:
  workflow_dispatch:

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Repository variable AWS_REGION overrides (e.g. eu-central-1). Defaults if unset.
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'eu-central-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub forbids `secrets` in `if:` — resolve mode here (variable or secret AWS_AUTH_MODE=static).
      - name: Resolve AWS auth mode
        id: auth
        env:
          VAR_AUTH_MODE: ${{ vars.AWS_AUTH_MODE }}
          SECRET_AUTH_MODE: ${{ secrets.AWS_AUTH_MODE }}
        run: |
          USE_STATIC=false
          if [ "$VAR_AUTH_MODE" = "static" ] || [ "$SECRET_AUTH_MODE" = "static" ]; then
            USE_STATIC=true
          fi
          echo "use_static=$USE_STATIC" >> "$GITHUB_OUTPUT"
          echo "static_credentials=$USE_STATIC"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        run: mvn -B verify

      # OIDC only when not using static keys.
      - name: Check OIDC deploy role is configured
        if: steps.auth.outputs.use_static != 'true'
        env:
          ROLE_SECRET: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          ROLE_VAR: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "${ROLE_SECRET}" ] && [ -z "${ROLE_VAR}" ]; then
            echo "::error::Set repository secret AWS_ROLE_TO_ASSUME *or* variable AWS_DEPLOY_ROLE_ARN to the deploy IAM role ARN (terraform output -raw github_actions_deploy_role_arn). Or use static keys: secrets AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY and set AWS_AUTH_MODE=static (variable or secret)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.auth.outputs.use_static != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'eu-central-1' }}
          role-session-name: github-actions-deploy

      - name: Configure AWS credentials (IAM user access keys)
        if: steps.auth.outputs.use_static == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'eu-central-1' }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Upload bundle and deploy to Elastic Beanstalk
        env:
          CF_STACK: ${{ vars.CLOUDFORMATION_STACK_NAME }}
          BUCKET_VAR: ${{ vars.EB_S3_BUCKET }}
          APP_VAR: ${{ vars.EB_APPLICATION_NAME }}
          ENV_VAR: ${{ vars.EB_ENVIRONMENT_NAME }}
          VERSION_LABEL: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -n "${AWS_REGION:-}" || { echo "::error::Set repository variable AWS_REGION (e.g. eu-central-1)"; exit 1; }

          # Trim whitespace (empty-looking vars in GitHub UI often still have spaces)
          CF_STACK_TRIMMED=$(echo "${CF_STACK:-}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          if [ -n "${CF_STACK_TRIMMED}" ]; then
            echo "Resolving EB/S3 from CloudFormation stack: ${CF_STACK_TRIMMED}"
            OUT=$(aws cloudformation describe-stacks --stack-name "${CF_STACK_TRIMMED}" --output json)
            BUCKET=$(echo "$OUT" | jq -r '.Stacks[0] | (.Outputs // [])[] | select(.OutputKey=="DeploymentsBucketName") | .OutputValue')
            APP=$(echo "$OUT" | jq -r '.Stacks[0] | (.Outputs // [])[] | select(.OutputKey=="ElasticBeanstalkApplicationName") | .OutputValue')
            ENV=$(echo "$OUT" | jq -r '.Stacks[0] | (.Outputs // [])[] | select(.OutputKey=="EbEnvironmentName") | .OutputValue')
          else
            BUCKET="${BUCKET_VAR:-}"
            BUCKET=$(echo "$BUCKET" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            APP="${APP_VAR:-}"
            APP=$(echo "$APP" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            ENV="${ENV_VAR:-}"
            ENV=$(echo "$ENV" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          fi

          MISSING=""
          { [ -z "${BUCKET:-}" ] || [ "$BUCKET" = "null" ]; } && MISSING="${MISSING} BUCKET"
          { [ -z "${APP:-}" ] || [ "$APP" = "null" ]; } && MISSING="${MISSING} APP"
          { [ -z "${ENV:-}" ] || [ "$ENV" = "null" ]; } && MISSING="${MISSING} ENV"
          if [ -n "${MISSING}" ]; then
            echo "::error::Missing:${MISSING}"
            if [ -z "${CF_STACK_TRIMMED}" ]; then
              echo "No deploy target configured: set repository variable CLOUDFORMATION_STACK_NAME (from: terraform output -raw cloudformation_stack_name)"
              echo "or set EB_S3_BUCKET, EB_APPLICATION_NAME, EB_ENVIRONMENT_NAME (Settings → Secrets and variables → Actions → Variables)."
            else
              echo "Stack ${CF_STACK_TRIMMED} was read but expected outputs are empty. Check CloudFormation → stack → Outputs for DeploymentsBucketName, ElasticBeanstalkApplicationName, EbEnvironmentName."
              aws cloudformation describe-stacks --stack-name "${CF_STACK_TRIMMED}" --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' --output table || true
            fi
            exit 1
          fi

          zip -j bundle.zip target/application.jar
          KEY="releases/${VERSION_LABEL}.zip"
          aws s3 cp bundle.zip "s3://${BUCKET}/${KEY}"
          aws elasticbeanstalk create-application-version \
            --application-name "${APP}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${BUCKET},S3Key=${KEY}"
          aws elasticbeanstalk update-environment \
            --environment-name "${ENV}" \
            --version-label "${VERSION_LABEL}"
