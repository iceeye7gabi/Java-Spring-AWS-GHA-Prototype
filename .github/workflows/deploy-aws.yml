# Deploys a new Elastic Beanstalk application version (build JAR → upload to S3 → create version → update env).
#
# Authentication (pick one):
#   A) OIDC (recommended): repository secret AWS_ROLE_TO_ASSUME + IAM role from Terraform
#   B) Static keys: secrets AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY + variable AWS_AUTH_MODE=static
#
# Trigger: manual only (Actions → Deploy to AWS → Run workflow). See .github/DEPLOY_AWS_SETUP.md

name: Deploy to AWS (Elastic Beanstalk)

on:
  workflow_dispatch:

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Repository variable AWS_REGION overrides (e.g. eu-central-1). Defaults if unset.
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'eu-central-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        run: mvn -B verify

      - name: Configure AWS credentials (OIDC)
        if: vars.AWS_AUTH_MODE != 'static'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'eu-central-1' }}

      - name: Configure AWS credentials (IAM user access keys)
        if: vars.AWS_AUTH_MODE == 'static'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'eu-central-1' }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Upload bundle and deploy to Elastic Beanstalk
        env:
          BUCKET: ${{ vars.EB_S3_BUCKET }}
          APP: ${{ vars.EB_APPLICATION_NAME }}
          ENV: ${{ vars.EB_ENVIRONMENT_NAME }}
          VERSION_LABEL: ${{ github.sha }}
        run: |
          set -euo pipefail
          test -n "${AWS_REGION:-}" || { echo "Set repository variable AWS_REGION (e.g. eu-central-1)"; exit 1; }
          test -n "${BUCKET:-}" && test -n "${APP:-}" && test -n "${ENV:-}" \
            || { echo "Set variables EB_S3_BUCKET, EB_APPLICATION_NAME, EB_ENVIRONMENT_NAME"; exit 1; }
          zip -j bundle.zip target/application.jar
          KEY="releases/${VERSION_LABEL}.zip"
          aws s3 cp bundle.zip "s3://${BUCKET}/${KEY}"
          aws elasticbeanstalk create-application-version \
            --application-name "${APP}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${BUCKET},S3Key=${KEY}"
          aws elasticbeanstalk update-environment \
            --environment-name "${ENV}" \
            --version-label "${VERSION_LABEL}"
